name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-node:
    name: NestJS Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Run unit tests
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/link_graveyard
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          REDIS_HOST: localhost
          REDIS_PORT: 6379
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: link_graveyard
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  test-python-unit:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Run unit tests
        run: pytest -v --tb=short -k "not e2e"
        env:
          REDIS_URL: redis://localhost:6379/0
          NESTJS_INTERNAL_URL: http://localhost:3000
          INTERNAL_WORKER_SECRET: test-secret
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  test-python-e2e:
    name: Python E2E Pipeline Tests
    runs-on: ubuntu-latest
    needs: [test-node]
    defaults:
      run:
        working-directory: backend-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Start services via docker-compose
        working-directory: .
        run: |
          docker compose up -d postgres redis
          sleep 8
      - name: Run e2e pipeline tests
        run: pytest -v --tb=short -k "e2e"
        env:
          REDIS_URL: redis://localhost:6379/0
          DATABASE_URL: postgresql://user:pass@localhost:5432/link_graveyard
          NESTJS_INTERNAL_URL: http://localhost:3000
          INTERNAL_WORKER_SECRET: test-secret
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: link_graveyard
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-node, test-python-unit, test-python-e2e]
    if: github.ref == "refs/heads/main" && github.event_name == "push"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend-node
          push: true
          tags: ghcr.io/${{ github.repository }}/api-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and push Python Worker
        uses: docker/build-push-action@v5
        with:
          context: ./backend-python
          push: true
          tags: ghcr.io/${{ github.repository }}/python-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max