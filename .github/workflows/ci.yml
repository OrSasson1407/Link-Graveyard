name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-node:
    name: Lint & Test NestJS
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-node

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend-node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5439/link_graveyard_test
          REDIS_HOST: localhost
          REDIS_PORT: 6380  
          JWT_SECRET: test-secret
          JWT_REFRESH_SECRET: test-refresh-secret

  lint-and-test-python:
    name: Lint & Test Python Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend-python/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PyTest
        run: pytest --tb=short -v
        env:
          INTERNAL_WORKER_SECRET: test-secret
          OPENAI_API_KEY: test-key

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-and-test-node, lint-and-test-python]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build NestJS image
        run: docker build -t link-graveyard-api:latest ./backend-node

      - name: Build Python Worker image
        run: docker build -t link-graveyard-worker:latest ./backend-python
