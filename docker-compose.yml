services:
  api-gateway:
    build:
      context: ./backend-node
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://user:pass@postgres:5432/link_graveyard
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis

  python-worker:
    build:
      context: ./backend-python
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis

  celery-worker:
    build:
      context: ./backend-python
    command: celery -A app.worker.tasks worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=link_graveyard
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

volumes:
  pgdata:
